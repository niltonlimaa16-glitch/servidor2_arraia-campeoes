<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arraiá dos Campeões · Copa Financeira 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,500;1,9..144,600&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  /* ── COLOR TOKENS ─────────────────────────────────
     Base: deep indigo night (festa junina sky after dusk)
     Accent: aged brass/gold (fogueira light), terracotta ember, flag green */
  --bg:#070A14;          --bg-soft:#0B0F1E;
  --s0:#0C1224;          --s1:#101830;          --s2:#16204000;
  --s2:#162040;
  --bd:#22304F;          --bd-soft:#1A2540;     --bd-bright:#3A5489;

  --brass:#C9A24B;       --brass-l:#E8C875;     --brass-d:#8A6B2A;
  --brass-wash:rgba(201,162,75,.12);

  --ember:#D2542E;       --ember-l:#EC7A4F;     --ember-wash:rgba(210,84,46,.13);
  --pine:#3E9B6F;        --pine-l:#5BC492;      --pine-wash:rgba(62,155,111,.13);
  --sky:#5C8FD6;         --sky-wash:rgba(92,143,214,.13);

  --ink:#EDEFF6;         --ink-soft:#9BA8C4;    --ink-dim:#5A6688;    --ink-ghost:#2A3454;

  --serif:'Fraunces',Georgia,serif;
  --sans:'Inter',-apple-system,sans-serif;
  --mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100vh;}
input,select,button,textarea{font-family:var(--sans);}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px;}::-webkit-scrollbar-track{background:transparent;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.55) sepia(.6) saturate(2) hue-rotate(355deg);cursor:pointer;opacity:.8;}
::selection{background:rgba(201,162,75,.32);}::placeholder{color:var(--ink-dim);}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--brass-l);outline-offset:2px;}

/* ── ANIMATIONS ─────────────────────────────────── */
@keyframes twinkle{0%,100%{opacity:.05;transform:scale(.6)}50%{opacity:.65;transform:scale(1)}}
@keyframes bander{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
@keyframes fire{0%,100%{transform:scaleY(1) scaleX(1)}33%{transform:scaleY(1.12) scaleX(.9)}66%{transform:scaleY(.92) scaleX(1.08)}}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}65%{transform:scale(1.16)}85%{transform:scale(.96)}100%{transform:scale(1);opacity:1}}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spinEl{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes prizeIn{0%{transform:scale(0) rotate(-6deg);opacity:0}70%{transform:scale(1.08) rotate(1deg)}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float1{0%,100%{transform:translateY(0) rotate(-4deg) scale(1)}33%{transform:translateY(-20px) rotate(4deg) scale(1.05)}66%{transform:translateY(-6px) rotate(-2deg) scale(.97)}}
@keyframes float2{0%,100%{transform:translateY(-12px) rotate(6deg)}50%{transform:translateY(12px) rotate(-6deg)}}
@keyframes float3{0%,100%{transform:translateY(0) rotate(2deg)}45%{transform:translateY(-22px) rotate(-5deg) scale(1.04)}75%{transform:translateY(-5px) rotate(3deg)}}
@keyframes cellGlow{0%,100%{box-shadow:0 0 0 1px var(--bd),inset 0 0 0 1px rgba(255,255,255,.02)}50%{box-shadow:0 0 0 1px var(--bd-bright),0 0 14px rgba(92,143,214,.22)}}
@keyframes goldGlow{0%,100%{box-shadow:0 0 0 2px rgba(201,162,75,.55),0 0 18px rgba(201,162,75,.28)}50%{box-shadow:0 0 0 2px var(--brass),0 0 32px rgba(201,162,75,.5)}}
@keyframes rankCardIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseRing{0%,100%{box-shadow:0 0 0 0 rgba(201,162,75,.35)}50%{box-shadow:0 0 0 6px rgba(201,162,75,0)}}
@keyframes shimmer{0%{background-position:-300% 0}100%{background-position:300% 0}}

/* ── FLOATING DECOR ─────────────────────────────── */
.float-flag{position:absolute;pointer-events:none;user-select:none;z-index:0;}

/* ── BANDEIROLAS (refined: smaller, less cartoonish) ── */
.bander-row{display:flex;justify-content:center;overflow:hidden;padding-bottom:0;opacity:.85;}
.bander-flag{width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;margin:0 3px;transform-origin:top center;}

/* ── PANEL CELLS ────────────────────────────────── */
.cell{aspect-ratio:1;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:2px;position:relative;transition:all .14s cubic-bezier(.2,.8,.3,1);user-select:none;}
.cell-avail{
  background:var(--s1);
  border:1px solid var(--bd-soft);
  cursor:pointer;
}
.cell-avail:hover{
  transform:scale(1.18) translateZ(0);
  z-index:20;position:relative;
  background:var(--s2);
  border-color:var(--sky);
  box-shadow:0 0 0 1.5px var(--sky),0 0 22px rgba(92,143,214,.45)!important;
}
.cell-avail:active{transform:scale(.9) translateZ(0);}
.cell-num{
  font-family:var(--mono);
  font-size:clamp(9px,1vw,15px);font-weight:700;
  font-variant-numeric:tabular-nums;transition:all .15s;line-height:1;
  color:var(--ink-dim);
}
.cell-avail:hover .cell-num{color:var(--brass-l);transform:scale(1.08);}
.cell-sel{background:var(--brass-wash);border:1.5px solid var(--brass);animation:goldGlow 1.6s ease-in-out infinite;}
.cell-sel .cell-num{color:var(--brass-l);}
.cell-flipped{background:#080C18;border:1px solid #111A30;cursor:default;}
.cell-flag{font-size:clamp(11px,1.1vw,17px);line-height:1;margin-bottom:1px;opacity:.92;}
.cell-prize-dot{width:7px;height:7px;border-radius:50%;margin-top:1px;}
.cell-score{font-family:var(--mono);font-size:clamp(7px,.65vw,10px);font-weight:700;line-height:1;margin-top:1px;}
.unflip-hint{display:none;position:absolute;inset:0;border-radius:6px;background:rgba(210,84,46,.22);align-items:center;justify-content:center;font-size:16px;color:var(--ember-l);font-weight:900;}
.admin-mode .cell-flipped{cursor:pointer;}
.admin-mode .cell-flipped:hover{transform:scale(1.12);z-index:12;position:relative;filter:brightness(1.15);}
.admin-mode .cell-flipped:hover .unflip-hint{display:flex;}

/* ── FORM INPUTS ────────────────────────────────── */
.finput{width:100%;padding:11px 14px;background:var(--s0);border:1.5px solid var(--bd);border-radius:8px;color:var(--ink);font-size:13.5px;font-weight:500;outline:none;transition:border-color .2s,background .2s;}
.finput:focus{border-color:var(--brass);background:var(--bg-soft);}
.finput.error{border-color:var(--ember)!important;}
.ferr{color:var(--ember-l);font-size:10.5px;margin-top:5px;font-weight:600;display:none;}
.ferr.show{display:block;}
.flabel{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.flabel span{color:var(--ink-dim);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;}
.flabel small{background:var(--brass-wash);border:1px solid rgba(201,162,75,.3);border-radius:4px;padding:2px 7px;color:var(--brass-l);font-size:9px;font-weight:700;}

/* ── BUTTONS ────────────────────────────────────── */
.btn-gold{background:linear-gradient(160deg,var(--brass-l),var(--brass) 55%,var(--brass-d));border:none;border-radius:9px;color:#100A02;font-weight:800;cursor:pointer;transition:all .2s;padding:13px 20px;font-size:13.5px;letter-spacing:.2px;box-shadow:0 1px 0 rgba(255,255,255,.25) inset;}
.btn-gold:hover{filter:brightness(1.06);transform:translateY(-1px);box-shadow:0 8px 22px rgba(201,162,75,.32);}
.btn-gold:active{transform:translateY(0);}
.btn-ghost{background:transparent;border:1.5px solid var(--bd);border-radius:9px;color:var(--ink-soft);font-weight:700;cursor:pointer;transition:all .18s;padding:10px 16px;font-size:12px;}
.btn-ghost:hover{border-color:var(--bd-bright);color:var(--ink);background:rgba(255,255,255,.03);}
.btn-danger{background:rgba(210,84,46,.08);border:1px solid rgba(210,84,46,.28);border-radius:8px;color:var(--ember-l);font-weight:700;cursor:pointer;transition:all .15s;padding:10px 14px;font-size:11px;}
.btn-danger:hover{background:rgba(210,84,46,.16);}
.btn-red{background:linear-gradient(160deg,var(--ember-l),var(--ember));border:none;border-radius:9px;color:#fff;font-weight:800;cursor:pointer;transition:all .2s;padding:11px 20px;font-size:13px;}
.btn-red:hover{filter:brightness(1.08);}

/* ── MODAL ──────────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(4,6,12,.92);backdrop-filter:blur(10px);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--s1);border:1px solid var(--bd-soft);border-radius:18px;padding:28px 30px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;box-shadow:0 0 0 1px rgba(255,255,255,.02) inset,0 30px 90px rgba(0,0,0,.6);position:relative;animation:modalIn .28s cubic-bezier(.16,1,.3,1);}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:50%;width:30px;height:30px;color:var(--ink-soft);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;line-height:1;}
.modal-close:hover{background:rgba(255,255,255,.08);color:var(--ink);}

/* ── CARD / MISC ────────────────────────────────── */
.card{background:var(--s1);border:1px solid var(--bd-soft);border-radius:14px;}
.info-box{border-radius:9px;padding:10px 13px;margin-bottom:12px;display:flex;gap:9px;align-items:flex-start;}
.prog-bar-wrap{height:4px;background:var(--s2);border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:100%;background:linear-gradient(90deg,var(--brass-d),var(--brass-l));border-radius:2px;transition:width .5s;}
.cert-box{border:1.5px dashed var(--bd);border-radius:10px;padding:15px 16px;text-align:center;background:rgba(255,255,255,.015);cursor:pointer;transition:all .2s;}
.cert-box:hover{border-color:var(--brass);background:var(--brass-wash);}
.step-dot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;transition:all .35s;border:1.5px solid;font-family:var(--mono);}
.act-row{display:flex;align-items:center;gap:13px;padding:14px 16px;background:var(--s2);border:1.5px solid var(--bd-soft);border-radius:11px;cursor:pointer;transition:all .16s;margin-bottom:7px;}
.act-row:hover{transform:translateX(3px);border-color:var(--bd-bright);background:var(--s2);}
.rank-card{background:var(--s1);border:1px solid var(--bd-soft);border-radius:16px;padding:20px 14px;text-align:center;position:relative;overflow:hidden;transition:all .25s;animation:rankCardIn .5s ease both;}
.rank-card:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(0,0,0,.4);}
.rank-card.is-me{animation:rankCardIn .5s ease both,pulseRing 2.6s ease-in-out infinite;}
.log-row{display:flex;gap:12px;padding:13px 0;border-bottom:1px solid var(--bg);align-items:flex-start;}
.site-header{background:rgba(5,8,18,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd-soft);position:sticky;top:0;z-index:100;box-shadow:0 1px 0 rgba(255,255,255,.02) inset;}
.unflip-modal-wrap{position:fixed;inset:0;background:rgba(4,6,12,.9);backdrop-filter:blur(8px);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px;}
.unflip-modal-box{background:var(--s1);border:1px solid rgba(210,84,46,.3);border-radius:18px;padding:28px;width:100%;max-width:420px;box-shadow:0 0 70px rgba(210,84,46,.16);animation:modalIn .28s cubic-bezier(.16,1,.3,1);}
.frow{margin-bottom:15px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.flame{border-radius:50% 50% 28% 28%;filter:blur(1.5px);opacity:.92;}
.stat-card{background:var(--s1);border:1px solid var(--bd-soft);border-radius:14px;padding:18px 20px;}

/* ── TYPE HELPERS ───────────────────────────────── */
.display-text{font-family:var(--serif);font-weight:600;font-style:italic;}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:2.2px;text-transform:uppercase;color:var(--ink-dim);}
.mono-num{font-family:var(--mono);font-variant-numeric:tabular-nums;}

/* ── ICON (inline SVG sizing) ───────────────────── */
.ic{display:inline-block;vertical-align:middle;line-height:0;}
.ic svg{display:block;}

@media(max-width:880px){
  #panel-grid{grid-template-columns:repeat(10,1fr)!important;}
  .grid2cols-resp{grid-template-columns:1fr!important;}
}
</style>
</head>

const S={

// ════════════════ STORAGE ══════════════════════════
// NOTE: This local layer is the fallback / offline cache.
// When Supabase is configured (see supabase-sync.js), DB.* calls below
// are transparently routed through cloud sync with localStorage as cache.
const SK=k=>`arraias26:${k}`;
function loadStorage(){
  try{let p=JSON.parse(localStorage.getItem(SK('panel')));if(!p||p.length!==300){p=genPanel();localStorage.setItem(SK('panel'),JSON.stringify(p));}S.panel=p;}
  catch{S.panel=genPanel();localStorage.setItem(SK('panel'),JSON.stringify(S.panel));}
  try{S.flipped=JSON.parse(localStorage.getItem(SK('flipped')))||{};}catch{}
  try{S.scores =JSON.parse(localStorage.getItem(SK('scores') ))||{};}catch{}
  try{S.actLog =JSON.parse(localStorage.getItem(SK('log')    ))||[];}catch{}
}
const saveFlipped=()=>{localStorage.setItem(SK('flipped'),JSON.stringify(S.flipped));window.cloudSync?.pushFlipped?.();};
const saveScores =()=>{localStorage.setItem(SK('scores'), JSON.stringify(S.scores));window.cloudSync?.pushScores?.();};
const saveLog    =()=>{localStorage.setItem(SK('log'),    JSON.stringify(S.actLog));window.cloudSync?.pushLog?.();};

function doExport(){
  const d={panel:S.panel,flipped:S.flipped,scores:S.scores,actLog:S.actLog,date:new Date().toISOString()};
  const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);const a=document.createElement('a');
  a.href=u;a.download='arraia26-'+new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')+'.json';
  a.click();URL.revokeObjectURL(u);
}
function doImport(file){
  const r=new FileReader();
  r.onload=e=>{try{const d=JSON.parse(e.target.result);
    if(d.panel&&d.flipped!==undefined&&d.scores!==undefined&&d.actLog!==undefined){
      S.panel=d.panel;S.flipped=d.flipped;S.scores=d.scores;S.actLog=d.actLog;
      localStorage.setItem(SK('panel'),JSON.stringify(S.panel));
      saveFlipped();saveScores();saveLog();
      renderPage();if(S.page==='main'){buildPanelCells();updateRanking();updateHeader();}
      showToast('Dados importados com sucesso');
    }else showToast('Arquivo inválido',true);
  }catch(err){showToast('Erro ao importar: '+err.message,true);}};
  r.readAsText(file);
}

function showToast(msg,isError){
  let el=document.getElementById('toast-host');
  if(!el){el=document.createElement('div');el.id='toast-host';el.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;align-items:center;';document.body.appendChild(el);}
  const t=document.createElement('div');
  t.style.cssText=`background:${isError?'#2A1410':'#0F1A14'};border:1px solid ${isError?'rgba(224,87,58,.4)':'rgba(62,155,111,.4)'};color:${isError?'#EC7A4F':'#5BC492'};padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:600;box-shadow:0 10px 30px rgba(0,0,0,.4);animation:slideUp .25s ease both;white-space:nowrap`;
  t.textContent=msg;el.appendChild(t);
  setTimeout(()=>{t.style.transition='opacity .3s';t.style.opacity='0';setTimeout(()=>t.remove(),300);},2600);
}

// ════════════════ HELPERS ══════════════════════════
function genPanel(){
  const p=[...Array(30).fill('ouro'),...Array(80).fill('prata'),
    ...Array(70).fill('penalti'),...Array(80).fill('furada'),...Array(40).fill('mucha')];
  for(let i=p.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[p[i],p[j]]=[p[j],p[i]];}
  return p;
}
const getRanking=()=>USERS.map(u=>({...u,s:S.scores[u.id]||{t:0,p:0,b:0}})).sort((a,b)=>b.s.t-a.s.t);
const getFC=()=>Object.keys(S.flipped).length;
const getPct=()=>Math.round(getFC()/300*100);
const getUserById=id=>USERS.find(u=>u.id===id);
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fv=k=>esc(S.mFd[k]||'');
const ferr=k=>S.mFe[k]?`<div id="ferr-${k}" class="ferr show">${svgIcon('alert',11)} ${esc(S.mFe[k])}</div>`:`<div id="ferr-${k}" class="ferr"></div>`;
const feClass=k=>S.mFe[k]?'finput error':'finput';

// ════════════════ BUILDERS ═════════════════════════
function buildBandeirolas(n){
  const cs=['#C9A24B','#D2542E','#3E9B6F','#5C8FD6','#E8C875','#8A6B2A'];
  let h='<div class="bander-row">';
  for(let i=0;i<n;i++)h+=`<div class="bander-flag" style="border-top:14px solid ${cs[i%cs.length]};animation:bander ${(1.8+(i%4)*.25).toFixed(2)}s ease-in-out infinite;animation-delay:${((i*.08)%1.6).toFixed(2)}s"></div>`;
  return h+'</div>';
}
function buildSteps(cur){
  const steps=[{n:1,l:'Procedimento'},{n:2,l:'Detalhes'},{n:3,l:'Resultado'}];
  let h='<div style="display:flex;align-items:center;justify-content:center;margin-bottom:26px">';
  steps.forEach((s,i)=>{
    const done=cur>s.n,active=cur===s.n;
    h+=`<div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div class="step-dot" style="background:${done?'linear-gradient(160deg,var(--brass-l),var(--brass-d))':active?'var(--brass-wash)':'rgba(255,255,255,.03)'};border-color:${done||active?'var(--brass)':'var(--bd)'};color:${done?'#100A02':active?'var(--brass-l)':'var(--ink-ghost)'};box-shadow:${active?'0 0 14px rgba(201,162,75,.3)':'none'}">${done?svgIcon('check',13):s.n}</div>
      <span style="font-size:9px;font-weight:700;color:${active?'var(--brass-l)':done?'var(--pine-l)':'var(--ink-ghost)'};text-transform:uppercase;letter-spacing:1.2px;white-space:nowrap">${s.l}</span>
    </div>`;
    if(i<2)h+=`<div style="width:48px;height:1.5px;border-radius:1px;margin:0 8px;margin-bottom:18px;background:${done?'linear-gradient(90deg,var(--brass),rgba(201,162,75,.35))':'var(--bd)'}"></div>`;
  });
  return h+'</div>';
}
function buildChip(c,bg,bd,txt){return `<span style="background:${bg};border:1px solid ${bd};border-radius:5px;padding:3px 9px;color:${c};font-size:9.5px;font-weight:700;font-family:var(--mono)">${esc(txt)}</span>`;}
function buildField(label,k,type,ph,badge,min,max,step){
  return `<div class="frow">
    <div class="flabel"><span>${label}</span>${badge?`<small>${badge}</small>`:''}</div>
    <input type="${type||'text'}" id="f-${k}" class="${feClass(k)}" value="${fv(k)}" placeholder="${esc(ph||'')}" ${min?`min="${min}"`:''}${max?` max="${max}"`:''}${step?` step="${step}"`:''}${type==='date'?'style="color-scheme:dark"':''} oninput="updateField('${k}',this.value)">
    ${ferr(k)}
  </div>`;
}
function syncBadge(){
  const st=S.syncStatus;
  const map={
    local:{ic:'wifiOff',c:'var(--ink-dim)',t:'Local'},
    connecting:{ic:'wifi',c:'var(--sky)',t:'Conectando'},
    online:{ic:'wifi',c:'var(--pine-l)',t:'Sincronizado'},
    error:{ic:'wifiOff',c:'var(--ember-l)',t:'Sem conexão'},
  };
  const m=map[st]||map.local;
  return `<span title="Status de sincronização" style="display:inline-flex;align-items:center;gap:5px;color:${m.c};font-size:9.5px;font-weight:700">${svgIcon(m.ic,12)}${m.t}</span>`;
}

function renderLogin(){
  const floatFlags=[
    {e:'🇧🇷',top:'7%',left:'5%',sz:40,anim:'float1',dur:'4.2s',del:'0s',op:.55},
    {e:'🇦🇷',top:'11%',right:'7%',sz:34,anim:'float2',dur:'3.8s',del:'.5s',op:.5},
    {e:'🇫🇷',bottom:'20%',left:'4%',sz:28,anim:'float3',dur:'5.1s',del:'1s',op:.45},
    {e:'🇵🇹',top:'48%',right:'5%',sz:36,anim:'float1',dur:'4.5s',del:'1.5s',op:.5},
    {e:'🇺🇸',bottom:'10%',right:'13%',sz:30,anim:'float2',dur:'3.6s',del:'2s',op:.45},
    {e:'⚽',top:'30%',left:'2%',sz:22,anim:'float3',dur:'6s',del:'.8s',op:.3},
    {e:'🏆',top:'18%',left:'22%',sz:24,anim:'float2',dur:'6.2s',del:'2.8s',op:.28},
  ];
  const stars=STAR_DATA.slice(0,24).map(s=>`<div style="position:absolute;width:${s.sz}px;height:${s.sz}px;border-radius:50%;background:white;top:${s.top};left:${s.left};animation:twinkle ${s.dr} ease-in-out infinite;animation-delay:${s.dl};pointer-events:none;z-index:1"></div>`).join('');
  const flags=floatFlags.map(f=>{
    let pos=`top:${f.top||'auto'};left:${f.left||'auto'};`;
    if(f.right) pos+=`right:${f.right};`;
    if(f.bottom) pos+=`bottom:${f.bottom};`;
    return `<div class="float-flag" style="${pos}font-size:${f.sz}px;animation:${f.anim} ${f.dur} ease-in-out infinite;animation-delay:${f.del};opacity:${f.op};filter:drop-shadow(0 4px 14px rgba(0,0,0,.5))">${f.e}</div>`;
  }).join('');
  const pinBorder=S.pinErr?'var(--ember)':'rgba(255,255,255,.16)';
  return `<div style="min-height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:24px">

    <!-- HERO PHOTO BACKGROUND -->
    <div style="position:absolute;inset:0;z-index:0">
      <div style="position:absolute;inset:0;background-image:url('${IMG_HERO}');background-size:cover;background-position:center 30%;filter:saturate(1.05) brightness(.78)"></div>
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse 90% 70% at 50% 38%,rgba(7,10,20,.45) 0%,rgba(7,10,20,.86) 72%,var(--bg) 100%)"></div>
      <div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(7,10,20,.55) 0%,transparent 22%,transparent 60%,rgba(7,10,20,.96) 100%)"></div>
    </div>

    ${stars}${flags}

    <div style="position:relative;z-index:2;width:100%;max-width:460px">
      <div style="text-align:center;margin-bottom:22px">
        ${buildBandeirolas(24)}
        <div class="eyebrow" style="margin:14px 0 8px;color:var(--brass-l);text-shadow:0 2px 12px rgba(0,0,0,.6)">Copa Financeira · Junho 2026</div>
        <h1 class="display-text" style="font-size:clamp(34px,6vw,46px);color:#fff;letter-spacing:-.6px;line-height:1.05;text-shadow:0 4px 28px rgba(0,0,0,.65)">Arraiá da Copa<br><span style="color:var(--brass-l)">Equipe Financeira</span></h1>
        <p style="color:rgba(255,255,255,.65);font-size:11.5px;font-weight:600;margin-top:10px;text-shadow:0 2px 10px rgba(0,0,0,.6)">Time que joga junto, conquista junto</p>
      </div>

      <div style="background:rgba(10,14,26,.62);backdrop-filter:blur(22px) saturate(1.3);-webkit-backdrop-filter:blur(22px) saturate(1.3);border:1px solid rgba(255,255,255,.12);border-radius:20px;overflow:hidden;box-shadow:0 30px 90px rgba(0,0,0,.55),0 1px 0 rgba(255,255,255,.08) inset">
        <div style="padding:30px 30px 28px">
          <p class="eyebrow" style="margin-bottom:12px;text-align:center;color:rgba(255,255,255,.55)">Insira seu PIN de acesso</p>
          <input type="password" id="pin-input" maxlength="4" value="${esc(S.pin)}"
            style="width:100%;padding:17px;background:rgba(0,0,0,.3);border:1.5px solid ${pinBorder};border-radius:13px;color:#fff;font-size:27px;font-weight:700;outline:none;letter-spacing:14px;text-align:center;transition:border-color .2s;font-family:var(--mono)"
            placeholder="••••"
            oninput="S.pin=this.value;S.pinErr='';document.getElementById('pin-err').style.display='none'"
            onkeydown="if(event.key==='Enter')doLogin()">
          <div id="pin-err" style="color:var(--ember-l);font-size:11.5px;margin-top:9px;font-weight:600;text-align:center;display:${S.pinErr?'flex':'none'};align-items:center;justify-content:center;gap:6px">${svgIcon('alert',13)}<span>${esc(S.pinErr)}</span></div>
          <button class="btn-gold" onclick="doLogin()" style="width:100%;padding:16px;font-size:14.5px;margin-top:18px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px">${svgIcon('chevron',15)}<span>Entrar na competição</span></button>
        </div>
        <div style="padding:13px 30px;background:rgba(0,0,0,.22);border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;gap:12px">
          <p style="color:rgba(255,255,255,.4);font-size:9.5px;font-weight:600;letter-spacing:.3px">Connect Serviços de Comunicações · Setor Financeiro</p>
          <span style="color:rgba(255,255,255,.25)">·</span>
          ${syncBadge()}
        </div>
      </div>
    </div>
  </div>`;
}

function renderAdmin(){
  const fc=getFC(),pct=getPct(),ranking=getRanking();

  const medalColor=['#E8C875','#C7CEDC','#C98A4F'];

      else if((e.act==='negociacao'||e.act==='renegociacao')&&e.fd)det=`${esc(e.fd.cod)} · <b>${esc(e.fd.nome)}</b> · ${esc(e.fd.valor)} · Liq. ${esc(e.fd.data||'—')}`;
      else if(e.act==='curso'&&e.fd)det=`<b>${esc(e.fd.titulo)}</b> · ${esc(e.fd.horas)}h · ${esc(e.fd.plataforma)} · ${esc(e.fd.data||'—')}`;

          <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:3px;flex-wrap:wrap">
            <span style="color:var(--ink);font-size:12px;font-weight:700">${esc(e.name)}</span>
            <span class="mono-num" style="color:var(--ink-ghost);font-size:9px">${esc(e.time)}</span>
          </div>
          <div style="color:var(--ink-soft);font-size:10.5px;margin-bottom:6px">${am?.label} · Nº${e.num+1}</div>
          ${det?`<div style="color:var(--ink-dim);font-size:10px;margin-bottom:6px;background:var(--s2);border-radius:6px;padding:6px 10px">${det}</div>`:''}
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            ${buildChip('var(--pine-l)','var(--pine-wash)','rgba(62,155,111,.25)','+'+e.pg+' proc')}
            ${buildChip(pr?.c||'#888',pr?.d||'rgba(255,255,255,.06)',`${pr?.c}33`,(e.bg>=0?'+':'')+e.bg+' '+pr?.label)}
            ${buildChip('var(--brass-l)','var(--brass-wash)','rgba(201,162,75,.3)',(e.total>=0?'+':'')+e.total+' total')}
          </div>
        </div>
      </div>`;
    }).join('');
  const stats=[
    {ic:'clipboard',val:S.actLog.length,lbl:'Registros'},
    {ic:'target',val:`${fc} (${pct}%)`,lbl:'Números virados'},
    {ic:'fire',val:300-fc,lbl:'Disponíveis'},
    {ic:'trophy',val:Object.values(S.scores).reduce((s,sc)=>s+(sc.t||0),0),lbl:'Gols totais'},
  ];
  return `<div style="min-height:100vh;background:var(--bg);padding:22px">
    <div style="max-width:1280px;margin:0 auto">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">

          <h1 class="display-text" style="font-size:21px;color:var(--ink);letter-spacing:-.2px;display:flex;align-items:center;gap:9px">${svgIcon('shield',18)}<span>Painel administrativo</span></h1>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-ghost" onclick="doExport()" style="font-size:10.5px;padding:8px 13px;display:flex;align-items:center;gap:6px">${svgIcon('download',13)}Exportar backup</button>
          <button class="btn-ghost" onclick="document.getElementById('import-file-input').click()" style="font-size:10.5px;padding:8px 13px;display:flex;align-items:center;gap:6px">${svgIcon('upload',13)}Importar</button>
        </div>
      </div>
      <div class="grid4" style="margin-bottom:22px">
        ${stats.map(s=>`<div class="stat-card"><div style="color:var(--brass-l);opacity:.85;margin-bottom:9px">${svgIcon(s.ic,19)}</div><div class="mono-num" style="color:var(--brass-l);font-size:28px;font-weight:800;line-height:1">${s.val}</div><div style="color:var(--ink-soft);font-size:11.5px;font-weight:700;margin-top:7px">${s.lbl}</div></div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:260px 1fr;gap:14px" class="grid2cols-resp">
        <div style="display:flex;flex-direction:column;gap:12px">
          <div class="card" style="padding:17px"><h3 style="font-size:13px;color:var(--ink);font-weight:800;letter-spacing:-.1px;margin-bottom:14px;display:flex;align-items:center;gap:7px">${svgIcon('trophy',15)}Ranking</h3>${rankRows}</div>
          <div class="card" style="padding:17px">
            <p class="eyebrow" style="margin-bottom:10px">Ações da campanha</p>
            <p style="color:var(--ink-dim);font-size:10.5px;line-height:1.5;margin-bottom:14px">Resetar apaga todo o progresso, pontuações e histórico de forma permanente. Use apenas no início de uma nova campanha.</p>
            <button class="btn-danger" onclick="doResetCampaign()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px">${svgIcon('trash',12)}Resetar campanha</button>
          </div>
        </div>
        <div class="card" style="padding:17px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">
            <h3 style="font-size:13px;color:var(--ink);font-weight:800;letter-spacing:-.1px;display:flex;align-items:center;gap:7px">${svgIcon('clipboard',15)}Log de atividades</h3>
            <select onchange="S.filterU=this.value;renderPage()" style="background:var(--s2);border:1px solid var(--bd-soft);border-radius:8px;color:var(--ink-soft);font-size:11px;font-weight:600;padding:6px 11px;outline:none;font-family:var(--sans)">
              <option value="all" ${S.filterU==='all'?'selected':''}>Todos</option>
              ${USERS.map(u=>`<option value="${u.id}" ${S.filterU===u.id?'selected':''}>${u.name}</option>`).join('')}
            </select>
          </div>
          <div style="max-height:600px;overflow-y:auto">${logRows}</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ════════════════ MODAL ════════════════════════════
function openModalStep(step){
  S.mStep=step;
  const ml=document.getElementById('modal-layer');
  ml.innerHTML=`<div class="modal-overlay" onclick="handleOverlayClick(event)"><div class="modal-box"><button class="modal-close" onclick="closeModal()">${svgIcon('close',14)}</button>${buildModalContent()}</div></div>`;
  if(step==='reveal'&&S.rv){window._spinStarted=false;const prizeAtOpen=S.rv.prize;window._spinTimer=setTimeout(()=>{if(S.rv)startReveal(prizeAtOpen);},120);}
}
function closeModal(){
  if(window._spinTimer){clearTimeout(window._spinTimer);window._spinTimer=null;}
  window._spinStarted=false;
  S.mNum=null;S.mStep=null;S.mAct=null;S.mFd={};S.mFe={};S.mCertName=null;S.rv=null;
  document.getElementById('modal-layer').innerHTML='';
  updateRanking();updateHeader();
}
function handleOverlayClick(e){if(e.target===e.currentTarget)closeModal();}
function buildModalContent(){
  if(S.mStep==='act')return buildStepAct();
  if(S.mStep==='form')return buildStepForm();
  if(S.mStep==='reveal')return buildStepReveal();
  return '';
}
function buildStepAct(){
  return buildSteps(1)+`<div style="text-align:center;margin-bottom:20px">
    <div class="display-text" style="font-size:24px;color:var(--brass-l);letter-spacing:-.2px">Número #${(S.mNum??0)+1}</div>
    <p style="color:var(--ink-ghost);font-size:11px;margin-top:4px;font-weight:600">Selecione o procedimento realizado</p>

(function(){

          S.scores = row.scores || {};

          localStorage.setItem(SK('panel'), JSON.stringify(S.panel));

})();

function buildPanelCells(){

    cell.id=`cell-${i}`;cell.className='cell';
    cell.addEventListener('click',()=>handleCellClick(i));
    cell.addEventListener('mouseenter',()=>{
      if(S.flipped[i]&&S.user?.isAdmin){
        const h=cell.querySelector('.unflip-hint');
        if(h){h.style.display='flex';cell.style.transform='scale(1.1)';cell.style.zIndex='12';cell.style.position='relative';cell.style.filter='brightness(1.12)';}
      }
    });
    cell.addEventListener('mouseleave',()=>{
      if(S.flipped[i]&&S.user?.isAdmin){
        const h=cell.querySelector('.unflip-hint');
        if(h){h.style.display='none';cell.style.transform='';cell.style.zIndex='';cell.style.position='';cell.style.filter='';}
      }

    grid.appendChild(cell);renderCell(i);

}

    cell.style.background='';cell.style.borderColor='';cell.style.borderWidth='';

    return `<div class="rank-card${isMe?' is-me':''}" style="${bgStyle};${borderStyle};animation-delay:${rankDelay[i]}s">
      <div class="mono-num" style="position:absolute;top:12px;right:13px;font-size:${i<3?13:11}px;font-weight:800;color:${i<3?medalColor[i]:'var(--ink-ghost)'};opacity:${i<3?1:.6}">#${i+1}</div>
      <div style="font-size:38px;margin-bottom:8px">${u.flag}</div>
      <div style="color:${isMe?u.c:'var(--ink)'};font-size:12.5px;font-weight:700;margin-bottom:2px">${u.name}</div>
      <div style="color:var(--ink-ghost);font-size:9px;font-weight:600;margin-bottom:14px">${u.country}</div>
      <div class="display-text mono-num" style="font-size:38px;color:${i===0?'var(--brass-l)':isMe?u.c:'var(--ink)'};letter-spacing:-1px;line-height:1;margin-bottom:5px;font-style:normal;font-weight:700">${u.s.t}</div>
      <div style="color:var(--ink-ghost);font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:14px">Gols totais</div>
      <div style="display:flex;justify-content:center;gap:8px">
        <div style="background:var(--pine-wash);border:1px solid rgba(62,155,111,.2);border-radius:8px;padding:6px 10px;text-align:center">
          <div class="mono-num" style="color:var(--pine-l);font-size:13px;font-weight:800;line-height:1">${u.s.p}</div>
          <div style="color:var(--ink-ghost);font-size:7.5px;font-weight:700;text-transform:uppercase;margin-top:3px;letter-spacing:.4px">Proc.</div>
        </div>
        <div style="background:var(--brass-wash);border:1px solid rgba(201,162,75,.2);border-radius:8px;padding:6px 10px;text-align:center">
          <div class="mono-num" style="color:var(--brass-l);font-size:13px;font-weight:800;line-height:1">${u.s.b>=0?'+':''}${u.s.b}</div>
          <div style="color:var(--ink-ghost);font-size:7.5px;font-weight:700;text-transform:uppercase;margin-top:3px;letter-spacing:.4px">Bônus</div>
        </div>
      </div>
    </div>`;
  }).join('');
  if(maEl){
    const myLog=S.actLog.filter(e=>e.uid===S.user?.id).slice(0,6);
    maEl.innerHTML=myLog.length===0?'':`<div class="card" style="padding:17px">
      <h3 style="color:var(--ink);font-size:12.5px;font-weight:800;margin-bottom:13px;display:flex;align-items:center;gap:7px">${svgIcon('clipboard',14)}Minhas últimas atividades</h3>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
        ${myLog.map(e=>`<div style="background:var(--s2);border:1px solid var(--bd-soft);border-radius:10px;padding:11px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <span style="color:var(--brass-l)">${svgIcon(ACTS.find(a=>a.id===e.act)?.ic||'target',14)}</span>
            <span class="mono-num" style="color:${e.total>=0?'var(--pine-l)':'var(--ember-l)'};font-size:12px;font-weight:800">${e.total>=0?'+':''}${e.total}</span>
          </div>
          <div style="color:var(--ink-soft);font-size:10px;font-weight:700">${ACTS.find(a=>a.id===e.act)?.label}</div>
          <div style="color:var(--ink-ghost);font-size:9px;margin-top:2px">Nº${e.num+1}${e.fd?.data?' · '+esc(e.fd.data):''}</div>
        </div>`).join('')}
      </div>
    </div>`;
  }
}
function updateHeader(){
  const fc=getFC(),pct=getPct();
  const p=document.getElementById('h-pct'),pb=document.getElementById('h-prog');
  const av=document.getElementById('h-avail'),tot=document.getElementById('h-total');
  const ms=document.getElementById('h-my-score');
  if(p)p.textContent=pct+'%';if(pb)pb.style.width=pct+'%';
  if(av)av.textContent=(300-fc)+' disp.';if(tot)tot.textContent=fc+'/300';
  if(ms)ms.textContent=(S.scores[S.user?.id]?.t??0)+' gols';
}

// ════════════════ REVEAL ═══════════════════════════
function startReveal(finalPrize){
  if(window._spinStarted)return;window._spinStarted=true;
  let count=0,delay=70;
  function spin(){
    const pr=PRIZES[PRIZE_KEYS[count%PRIZE_KEYS.length]];
    const ee=document.getElementById('spin-emoji'),ne=document.getElementById('spin-name');
    if(ee){ee.textContent=pr.e;ee.style.filter='blur(3px)';}
    if(ne){ne.textContent=pr.label;ne.style.color=pr.c;}
    count++;if(count<26){if(count>14)delay=Math.min(delay*1.28,420);window._spinTimer=setTimeout(spin,delay);}
    else showFinal(finalPrize);
  }
  window._spinTimer=setTimeout(spin,70);
}
function showFinal(prize){
  const pr=PRIZES[prize];
  const ee=document.getElementById('spin-emoji'),ne=document.getElementById('spin-name'),se=document.getElementById('prize-score'),ce=document.getElementById('prize-card'),sl=document.getElementById('spin-label');
  if(sl)sl.textContent='Resultado apurado!';
  if(ee){ee.textContent=pr.e;ee.style.filter='none';ee.style.animation='prizeIn .5s ease';}
  if(ne){ne.textContent=pr.label;ne.style.color=pr.c;}
  if(se){se.textContent=(pr.v>0?'+':'')+pr.v+' '+(Math.abs(pr.v)===1?'GOL':'GOLS');se.style.color=pr.c;se.style.display='block';se.style.animation='bounceIn .5s ease .1s both';}
  if(ce){ce.style.background=pr.d;ce.style.borderColor=pr.c+'AA';ce.style.boxShadow=`0 0 70px ${pr.c}26`;}
  setTimeout(()=>{const bd=document.getElementById('score-breakdown');if(bd){bd.style.display='block';bd.style.animation='slideUp .4s ease both';}},600);
}

// ════════════════ ACTIONS ══════════════════════════
function doLogin(){
  const pi=document.getElementById('pin-input');if(pi)S.pin=pi.value.trim();
  if(!S.pin||S.pin.length<4){showPinErr('Digite seu PIN de 4 dígitos');return;}
  if(S.pin==='0000'){S.user={id:'admin',name:'Gestor',flag:'🔐',c:'var(--brass)',cD:'var(--brass-wash)',country:'Admin',isAdmin:true};S.pin='';setPage('main');return;}
  const u=USERS.find(u=>u.pin===S.pin);
  if(!u){showPinErr('PIN inválido. Consulte o gestor.');return;}
  S.user=u;S.pin='';setPage('main');
}
function showPinErr(msg){S.pinErr=msg;const e=document.getElementById('pin-err');if(e){e.querySelector('span').textContent=msg;e.style.display='flex';}}
function updateField(k,v){
  S.mFd[k]=v;
  if(S.mFe[k]){delete S.mFe[k];const i=document.getElementById('f-'+k),e=document.getElementById('ferr-'+k);if(i)i.classList.remove('error');if(e)e.classList.remove('show');}
}
function pickAct(id){S.mAct=id;S.mFd={};S.mFe={};S.mCertName=null;openModalStep('form');}
function goBackStep(){S.mFe={};openModalStep('act');}
function validateForm(){
  const e={};
  if(S.mAct==='media_bot'||S.mAct==='media_fone'){
    const mn=S.mAct==='media_bot'?9:4.5;
    if(!S.mFd.media||parseFloat(S.mFd.media)<mn)e.media='Nota deve ser ≥ '+(S.mAct==='media_bot'?'9,00':'4,50');
    if(!S.mFd.perc||parseFloat(S.mFd.perc)<50)e.perc='Avaliação deve ser ≥ 50%';
    if(!S.mFd.data)e.data='Data obrigatória';
  }else if(S.mAct==='negociacao'||S.mAct==='renegociacao'){
    if(!S.mFd.cod?.trim())e.cod='Obrigatório';if(!S.mFd.nome?.trim())e.nome='Obrigatório';
    if(!S.mFd.valor?.trim())e.valor='Obrigatório';if(!S.mFd.data)e.data='Obrigatório';
  }else if(S.mAct==='curso'){
    if(!S.mCertName)e.cert='Certificado obrigatório';
    if(!S.mFd.horas||parseInt(S.mFd.horas)<6)e.horas='Mínimo 6 horas';
    if(!S.mFd.data)e.data='Data de conclusão obrigatória';
    if(!S.mFd.titulo?.trim())e.titulo='Obrigatório';if(!S.mFd.plataforma?.trim())e.plataforma='Obrigatório';
  }
  return e;
}
function submitForm(){
  const errs=validateForm();if(Object.keys(errs).length){S.mFe=errs;openModalStep('form');return;}
  const prize=S.panel[S.mNum],pg=1,bg=PRIZES[prize].v,total=pg+bg;
  S.flipped[S.mNum]={uid:S.user.id,name:S.user.name,flag:S.user.flag,prize,time:new Date().toLocaleString('pt-BR')};
  const sc=S.scores[S.user.id]||{t:0,p:0,b:0};
  S.scores[S.user.id]={t:sc.t+total,p:sc.p+pg,b:sc.b+bg};
  const entry={id:Date.now(),uid:S.user.id,name:S.user.name,flag:S.user.flag,country:S.user.country||'',act:S.mAct,fd:S.mAct==='curso'?{...S.mFd,cert:S.mCertName}:S.mFd,prize,pg,bg,total,num:S.mNum,time:new Date().toLocaleString('pt-BR')};
  S.actLog.unshift(entry);saveFlipped();saveScores();saveLog();
  renderCell(S.mNum);updateHeader();
  S.rv={prize,prizeInfo:PRIZES[prize],pg,bg,total};
  openModalStep('reveal');
}
function confirmUnflip(){
  const idx=S.unflipNum;if(idx===null)return;const f=S.flipped[idx];if(!f)return;
  const entry=S.actLog.find(e=>e.num===idx);
  if(entry){const sc=S.scores[entry.uid]||{t:0,p:0,b:0};S.scores[entry.uid]={t:sc.t-entry.total,p:sc.p-entry.pg,b:sc.b-entry.bg};S.actLog=S.actLog.filter(e=>e.num!==idx);}
  delete S.flipped[idx];saveFlipped();saveScores();saveLog();
  closeUnflipModal();renderCell(idx);updateHeader();updateRanking();
}
function doResetCampaign(){
  if(!confirm('Resetar toda a campanha? Ação irreversível!'))return;
  S.panel=genPanel();S.flipped={};S.scores={};S.actLog=[];
  localStorage.setItem(SK('panel'),JSON.stringify(S.panel));saveFlipped();saveScores();saveLog();
  window.cloudSync?.pushPanel?.();
  if(S.page==='main'){updatePanelAll();updateRanking();updateHeader();}else renderPage();
}
function doLogout(){S.user=null;S.pin='';S.pinErr='';setPage('login');}
function goAdmin(){closeModal();S.page='admin';renderPage();}
function goMain(){S.page='main';renderPage();buildPanelCells();updateRanking();updateHeader();if(S.user?.isAdmin)document.body.classList.add('admin-mode');}

// ════════════════ PAGE MANAGEMENT ══════════════════
function setPage(pg){
  S.page=pg;closeModal();closeUnflipModal();
  renderPage();
  if(pg==='main'){
    buildPanelCells();updateRanking();updateHeader();
    if(S.user?.isAdmin)document.body.classList.add('admin-mode');
    else document.body.classList.remove('admin-mode');
  }else document.body.classList.remove('admin-mode');
}
function renderPage(){
  const pc=document.getElementById('page-content');
  if(S.page==='load')pc.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:var(--bg);gap:18px"><div style="color:var(--brass-l);animation:spinEl 1.1s linear infinite">${svgIcon('fire',40)}</div><div class="display-text" style="font-size:18px;color:var(--brass-l);letter-spacing:.5px">Carregando...</div></div>`;
  else if(S.page==='login')pc.innerHTML=renderLogin();
  else if(S.page==='main')pc.innerHTML=renderMainSkeleton();
  else if(S.page==='admin')pc.innerHTML=renderAdmin();
}

// ════════════════ FILE HANDLERS ════════════════════
document.getElementById('cert-file-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;S.mCertName=f.name;
  const box=document.querySelector('.cert-box');
  if(box)box.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;gap:10px"><span style="color:var(--pine-l)">${svgIcon('file',20)}</span><div><div style="color:var(--pine-l);font-size:12px;font-weight:700">${esc(f.name)}</div><div style="color:var(--ink-dim);font-size:10px;margin-top:1px">Clique para substituir</div></div></div>`;
  const ce=document.getElementById('ferr-cert');if(ce)ce.classList.remove('show');
  this.value='';
});
document.getElementById('import-file-input').addEventListener('change',function(e){
  const f=e.target.files[0];if(!f)return;doImport(f);this.value='';
});

// ════════════════ INIT ════════════════════════════
(function init(){
  renderPage();loadStorage();
  if(window.cloudSync?.init){window.cloudSync.init();}
  setTimeout(()=>{S.page='login';renderPage();setTimeout(()=>{const p=document.getElementById('pin-input');if(p)p.focus();},80);},700);
})();

</script>
